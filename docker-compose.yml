version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: mern-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - mern-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mern-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/mern-todo?authSource=admin
      PORT: 5000
      NODE_ENV: production
    depends_on:
      - mongodb
    networks:
      - mern-network
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mern-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - mern-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  mern-network:
    driver: bridge
